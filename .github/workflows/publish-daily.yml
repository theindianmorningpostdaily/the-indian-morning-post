name: Publish Daily Edition

# Runs the newsroom pipeline every morning at 04:00 IST.
# IST = UTC+5:30, so 04:00 IST == 22:30 UTC the previous day.
on:
  schedule:
    # 22:43 UTC = 04:13 IST. Off the hour/half-hour on purpose — GitHub's
    # shared scheduler delays/drops the most-contended round times (:00/:30).
    - cron: "43 22 * * *"
  workflow_dispatch:          # allow manual "Run workflow" from the Actions tab

# Avoid overlapping runs if a previous one is slow.
concurrency:
  group: publish-daily
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # allow pushing the rebuild marker
    defaults:
      run:
        working-directory: pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
          MAX_ARTICLES: "5"
          MIN_SOURCES: "2"
          LOOKBACK_HOURS: "24"
        run: python main.py

      # Cloudflare rebuilds the static site on any push (build watch paths = *).
      # Bump a marker file so new articles go live after each publish.
      - name: Trigger Cloudflare rebuild
        if: success()
        working-directory: ${{ github.workspace }}
        run: |
          COUNT=$(cat pipeline/published_count.txt 2>/dev/null || echo 0)
          if [ "$COUNT" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .last-publish
            git add .last-publish
            git commit -m "chore(site): rebuild after daily publish [auto]"
            git pull --rebase --autostash origin main || true
            git push
            echo "Triggered rebuild ($COUNT new article(s))."
          else
            echo "No new articles; skipping site rebuild."
          fi
