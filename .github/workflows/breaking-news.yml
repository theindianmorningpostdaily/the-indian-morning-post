name: Breaking News Check

# Every hour, look for major verified breaking news and publish only if a
# story clears the same 2-source verification bar (and isn't already published).
on:
  schedule:
    - cron: "17 * * * *"     # every hour at :17 (off the hour, less contended)
  workflow_dispatch:

concurrency:
  group: breaking-news
  cancel-in-progress: false

jobs:
  breaking:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # allow pushing the rebuild marker
    defaults:
      run:
        working-directory: pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (breaking mode)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
          MIN_SOURCES: "2"
          LOOKBACK_HOURS: "4"     # only very recent items count as "breaking"
        run: python main.py --breaking

      # Rebuild the static site (Cloudflare watches all repo pushes).
      - name: Trigger Cloudflare rebuild
        if: success()
        working-directory: ${{ github.workspace }}
        run: |
          COUNT=$(cat pipeline/published_count.txt 2>/dev/null || echo 0)
          if [ "$COUNT" -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .last-publish
            git add .last-publish
            git commit -m "chore(site): rebuild after breaking publish [auto]"
            git pull --rebase --autostash origin main || true
            git push
            echo "Triggered rebuild ($COUNT new article(s))."
          else
            echo "No new articles; skipping site rebuild."
          fi
