name: Breaking News Check

# Optional: every 2 hours, look for major verified breaking news and publish
# only if a story clears the same 2-source verification bar. Comment out the
# schedule block to disable and stay strictly on the daily edition.
on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours, on the hour (UTC)
  workflow_dispatch:

concurrency:
  group: breaking-news
  cancel-in-progress: false

jobs:
  breaking:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (breaking mode)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
          CF_PAGES_DEPLOY_HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
          MIN_SOURCES: "2"
          LOOKBACK_HOURS: "4"     # only very recent items count as "breaking"
        run: python main.py --breaking
